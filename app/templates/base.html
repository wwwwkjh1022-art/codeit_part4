<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Ad Copy Studio{% endblock %}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/styles.css') }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-content">
          <p class="eyebrow">Small Business Marketing Copilot</p>
          <h1>소상공인을 위한 광고 문구 스튜디오</h1>
          <p class="hero-copy">
            하나의 브리프로 Instagram, Threads, Blog용 콘텐츠와 업로드 전 검수 화면까지 준비합니다.
          </p>
          <nav class="top-nav" aria-label="주요 메뉴">
            <a href="/">새 캠페인</a>
            <a href="/campaigns">생성 이력</a>
          </nav>
        </div>
        <aside class="hero-card" aria-label="서비스 요약">
          <span>Campaign OS</span>
          <strong>3채널 자동 변환</strong>
          <p>생성, 품질 점수, 업로드 초안, 예약 준비를 한 흐름으로 관리합니다.</p>
          <div class="hero-metrics" aria-label="핵심 기능">
            <small>Copy</small>
            <small>Visual</small>
            <small>Score</small>
          </div>
        </aside>
      </header>
      <main>{% block content %}{% endblock %}</main>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
